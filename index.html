<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Ai Powered Object Detector" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="OritseWeyinmi Samuel Tuoyo" />
  <link rel="stylesheet" href="src/style.css" type="text/css" media="all" />
  <link rel="icon" type="image/svg+xml" href="/typescript.svg" />
  <title>AR Object Scanner</title>
</head>
<body>
  <div id="layout-wrapper">
    <main id="app-container">
      <header class="top-bar">
        <button class="icon-btn back-btn" aria-label="Back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2>AR Scanner</h2>
        <button id="btn-vocab-mobile" class="icon-btn" aria-label="Vocabulary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        </button>
      </header>

    <div class="search-bar">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Scan vocabulary..." disabled />
    </div>

    <div class="scanner-card">
      <div id="video-container">
        <video autoplay muted playsinline id="video-element"></video>
        <canvas id="canva-overlay"></canvas>
        <div class="overlay-controls top-right">
          <button class="icon-btn action-btn bg-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#222831" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          </button>
          <button class="icon-btn action-btn bg-navy text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </button>
        </div>
        
        <div id="hud" aria-label="Status">
          <span id="hud-status" class="hud-badge active">Starting…</span>
          <span id="hud-fps" class="hud-badge">-- fps</span>
        </div>
      </div>
      <p class="instruction-text">Swipe screen to go to next card</p>
    </div>

    <section id="settings-panel">
      <div class="setting-row">
        <label>Model</label>
        <select id="model-base">
          <option value="yolov8n">YOLOv8n (Fast)</option>
          <option value="yolov8s" selected>YOLOv8s (Better)</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Min confidence</label>
        <input id="min-score" type="range" min="0.10" max="0.90" step="0.05" value="0.30" />
      </div>
      <div class="setting-row">
        <label>Camera</label>
        <select id="camera-select"></select>
      </div>
    </section>

    <div class="bottom-nav">
      <button class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2A10 10 0 1 0 22 12 10 10 0 0 0 12 2Z"/><path d="m12 16 4-4-4-4"/><path d="M8 12h8"/></svg>
      </button>
      <button class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg>
      </button>
      <button class="nav-item active-scan" id="btn-start" aria-label="Start Scan">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="nav-item" id="btn-stop" disabled aria-label="Stop Scan">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
      </button>
      <button class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
      </button>
      <button class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      </button>
    </div>
  </main>

  <aside id="vocab-panel">
    <div class="vocab-header">
      <h3>Supported Objects (80)</h3>
      <button id="btn-close-vocab" class="icon-btn bg-navy hidden-desktop" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <ul id="vocab-list"></ul>
  </aside>
</div>
  
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
